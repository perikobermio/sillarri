services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: sillarri_app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      TMPDIR: /tmp
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  web:
    image: nginx:1.27-alpine
    container_name: sillarri_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: sillarri_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sillarri
      POSTGRES_USER: sillarri
      POSTGRES_PASSWORD: sillarri_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sillarri -d sillarri"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
